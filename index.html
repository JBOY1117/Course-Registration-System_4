<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <form action="register.php" method="post" enctype="multipart/form-data">
      <h2>Course Registration Form</h2>

      <label for="profilepic">Upload Profile Picture:</label>
      <input type="file" name="profilepic" required />
      <br />
      <br />
      <label for="fname">First Name:</label>
      <input type="text" id="fname" name="fname" required />
      <br />
      <br />
      <label for="lname">Last Name:</label>
      <input type="text" id="lname" name="lname" required /> <br /><br />

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required />
      <br />
      <br />
      <label for="pass">Password:</label>
      <input type="password" id="pass" name="pass" required />
      <br />
      <br />
      <label for="program">Program:</label>
      <select name="program" id="program" required>
        <option value="none">Select Program</option>
        <option value="bsc-cs">Bachelor of Science in Computer Science</option>
        <option value="bsc-it">Bachelor of Science in Information Technology</option>
        <option value="bsc-se">Bachelor of Science in Software Engineering</option>
        <option value="assoc-it">Associate Degree in IT Support</option>
      </select>
      <br />
      <br />

      <label for="doc">Document:</label>
      <input type="file" name="doc" required />
      <br />
      <br />

      <input type="submit" value="Register" />
    </form>

    <footer>
      <p>&copy; CODM 2026 Course Registration System. All rights reserved.</p>
      <p>Contact: <a href="mailto:support@registration.com">support@registration.com</a></p>
    </footer>
  </body>
</html>
